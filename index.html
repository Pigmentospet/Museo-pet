<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museo Pigmentos.pet</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
}

#sw{
  position:fixed;
  top:0;
  bottom:0;
  width:100%;
  overflow-x:scroll;
}

#scene{
  width:5400px;
  height:100vh;
  background:url('vestibulo-bg.PNG') no-repeat left center;
  background-size:auto 100%;
}

.hs{
  position:absolute;
  background:transparent;
  border:none;
}

.deco{
  position:absolute;
}
.deco img{
  width:100%;
}

/* MODAL */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
}
.overlay.open{display:flex;}

.modal{
  background:white;
  padding:20px;
  border-radius:15px;
}
</style>
</head>

<body>

<div id="sw">
<div id="scene">

<!-- RENA -->
<button class="hs"
style="left:240px;bottom:38%;width:720px;height:65%;"
onclick="openModal('rena')">
<img src="rena-vestibulo.PNG" style="width:100%;">
</button>

<!-- TIMBRE -->
<button class="hs"
style="left:900px;bottom:38%;width:200px;height:22%;"
onclick="openModal('rena')">
<img src="timbre.PNG" style="width:100%;">
</button>

<!-- DECOR -->
<div class="deco" style="left:40px;bottom:38%;width:160px;">
<img src="planta-01.PNG">
</div>

<div class="deco" style="left:820px;bottom:38%;width:300px;">
<img src="mostrador.PNG">
</div>

<div class="deco" style="left:1920px;bottom:38%;width:160px;">
<img src="planta-02.PNG">
</div>

<div class="deco" style="left:2820px;bottom:38%;width:180px;">
<img src="planta-03.PNG">
</div>

<!-- PUERTAS -->
<button class="hs"
style="left:1480px;bottom:38%;width:360px;height:56%;"
onclick="openDoor('galeria')">
<img src="puerta-galeria.PNG" style="width:100%;">
</button>

<button class="hs"
style="left:2120px;bottom:38%;width:620px;height:64%;"
onclick="openDoor('boutique')">
<img src="puerta-boutique.PNG" style="width:100%;">
</button>

<button class="hs"
style="left:3060px;bottom:38%;width:360px;height:54%;"
onclick="openDoor('taller')">
<img src="puerta-taller.PNG" style="width:100%;">
</button>

<button class="hs"
style="left:3720px;bottom:38%;width:360px;height:54%;"
onclick="openDoor('biblioteca')">
<img src="puerta-biblioteca.PNG" style="width:100%;">
</button>

<button class="hs"
style="left:4380px;bottom:38%;width:360px;height:54%;"
onclick="openDoor('altar')">
<img src="puerta-altar.PNG" style="width:100%;">
</button>

<button class="hs"
style="left:5060px;bottom:0;width:320px;height:100%;"
onclick="openDoor('galeria')">
<img src="arco-salida.PNG" style="width:100%;">
</button>

</div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal-rena">
  <div class="modal">
    🐕 Soy Rena<br><br>
    <button onclick="irA('galeria')">Galería</button>
    <button onclick="irA('boutique')">Boutique</button>
  </div>
</div>

<script>
const sw=document.getElementById('sw');

sw.addEventListener('wheel',e=>{
  e.preventDefault();
  sw.scrollLeft+=e.deltaY;
},{passive:false});

function openModal(id){
  document.getElementById('modal-'+id).classList.add('open');
}

function openDoor(key){
  alert("Entrar a "+key);
}

function irA(key){
  window.location.href=key+'.html';
}
</script>

</body>
</html>
