<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Museo Pigmentos.pet</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#C17B4A; --brand-dk:#9A5E33; --brand-lt:#D9A07A;
  --cream:#FDF6EE; --cream-dk:#F5E9D8; --ink:#3D2010; --ink-lt:#7A4820;
  --font:'Nunito',sans-serif; --font-ttl:'Cormorant Garamond',serif;
  --nav:50px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#5C3820;font-family:var(--font);-webkit-tap-highlight-color:transparent;}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav);background:var(--brand);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.nav-logo{font-family:var(--font-ttl);font-size:15px;font-weight:600;color:var(--cream);letter-spacing:.12em;text-transform:uppercase;}
.nav-menu-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:8px;padding:8px 10px;cursor:pointer;display:flex;flex-direction:column;gap:4px;}
.nav-menu-btn span{display:block;width:18px;height:2px;background:var(--cream);border-radius:1px;}

/* SCROLL WRAPPER */
#sw{position:fixed;top:var(--nav);left:0;right:0;bottom:0;overflow-x:scroll;overflow-y:hidden;cursor:grab;-webkit-overflow-scrolling:touch;user-select:none;}
#sw:active{cursor:grabbing;}
#sw::-webkit-scrollbar{display:none;}

/* ESCENA
   Todos los PNGs son 5400×1080 → ratio 5:1
   JS calcula: ancho = alto_disponible × 5
   Así la imagen llena exactamente la pantalla.
*/
#scene{
  position:relative;
  /* width y height los pone el JS */
  height:100%;
  overflow:hidden;
}

/* FONDO Y CAPAS DE IMAGEN
   Todos los PNGs son del mismo tamaño (5400×1080).
   Se apilan en position:absolute, inset:0, width:100%, height:100%.
   El orden en el HTML define cuál va encima.
*/
#scene img.layer{
  position:absolute;
  top:0; left:0;
  width:100%;
  height:100%;
  display:block;
  /* object-fit:fill para que coincida exactamente con el scene */
  object-fit:fill;
}

/* HOTSPOT — invisible, encima de todo */
.hs{
  position:absolute;
  background:transparent;
  border:none;padding:0;
  cursor:pointer;
  z-index:20;
  -webkit-tap-highlight-color:rgba(193,123,74,.15);
}
.hs:hover{background:rgba(193,123,74,.08);}
.hs:focus{outline:2px solid rgba(193,123,74,.4);}

/* DOTS */
.dots{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:300;}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(253,246,238,.2);border:1px solid rgba(253,246,238,.35);transition:all .3s;}
.dot.on{width:20px;border-radius:3px;background:rgba(253,246,238,.75);}
.dot-label{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(253,246,238,.45);white-space:nowrap;z-index:300;}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(40,18,6,.7);z-index:400;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
@media(min-width:600px){.overlay{align-items:center;}}

/* MODAL */
.modal{background:var(--cream);border-radius:20px 20px 0 0;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;animation:sUp .22s ease;}
@media(min-width:600px){.modal{border-radius:20px;width:90%;}}
@keyframes sUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.modal-head{background:var(--brand);border-radius:20px 20px 0 0;padding:14px 16px 12px;display:flex;align-items:center;gap:12px;position:relative;}
.modal-avatar{width:50px;height:50px;border-radius:50%;border:2px solid rgba(255,255,255,.35);background:var(--cream-dk);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;}
.modal-avatar img{width:100%;height:100%;object-fit:cover;}
.modal-head-name{font-size:15px;font-weight:800;color:var(--cream);line-height:1.1;}
.modal-head-sub{font-size:11px;color:rgba(253,246,238,.72);}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.18);border:none;width:28px;height:28px;border-radius:50%;color:var(--cream);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:rgba(255,255,255,.3);}
.modal-body{padding:16px 16px 24px;}
.bubble-wrap{margin-bottom:14px;}
.bubble-tail{display:block;margin-left:18px;margin-top:-1px;}
.bubble-box{background:var(--cream-dk);border:1.5px solid rgba(193,123,74,.2);border-radius:4px 16px 16px 16px;padding:12px 14px;font-size:14px;line-height:1.65;color:var(--ink);}
.bubble-box b{font-weight:800;color:var(--brand-dk);}
.bubble-box em{font-style:italic;color:var(--brand);}
.salas-label{font-size:10px;font-weight:700;color:var(--brand-dk);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
.salas-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.sala-btn{display:flex;flex-direction:column;gap:2px;padding:10px 11px;background:white;border:1.5px solid rgba(193,123,74,.22);border-radius:12px;cursor:pointer;text-align:left;font-family:var(--font);transition:all .15s;}
.sala-btn:hover{background:var(--cream-dk);border-color:var(--brand-lt);}
.sala-btn:active{transform:scale(.97);}
.sb-num{font-size:9px;color:var(--brand);font-weight:700;letter-spacing:.1em;}
.sb-name{font-size:12px;font-weight:800;color:var(--ink);line-height:1.2;}
.sb-desc{font-size:10px;color:var(--ink-lt);line-height:1.3;}
.door-num{font-size:9px;font-weight:700;color:var(--brand);letter-spacing:.15em;text-transform:uppercase;margin-bottom:2px;}
.door-name{font-family:var(--font-ttl);font-size:22px;font-weight:600;color:var(--ink);margin-bottom:12px;line-height:1.1;}
.door-line{height:1.5px;background:linear-gradient(90deg,var(--brand-lt),transparent);margin-bottom:14px;}
.door-cta{display:block;width:100%;padding:13px;background:var(--brand);color:var(--cream);font-family:var(--font);font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:12px;cursor:pointer;margin-top:16px;transition:background .15s;}
.door-cta:hover{background:var(--brand-dk);}
.menu-list{display:flex;flex-direction:column;gap:6px;}
.menu-item{display:flex;align-items:center;gap:12px;padding:12px 13px;background:white;border:1.5px solid rgba(193,123,74,.2);border-radius:12px;cursor:pointer;font-family:var(--font);width:100%;text-align:left;transition:all .15s;}
.menu-item:hover{background:var(--cream-dk);border-color:var(--brand-lt);}
.mi-num{width:30px;height:30px;border-radius:50%;background:var(--cream-dk);border:1.5px solid rgba(193,123,74,.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--brand-dk);flex-shrink:0;}
.mi-name{font-size:13px;font-weight:800;color:var(--ink);}
.mi-desc{font-size:11px;color:var(--ink-lt);}
.mi-arrow{font-size:14px;color:rgba(193,123,74,.5);margin-left:auto;}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">Museo Pigmentos.pet</span>
  <button class="nav-menu-btn" onclick="openModal('menu')" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
</nav>

<div id="sw"><div id="scene">

  <!--
  ═══════════════════════════════════════════════════════
  CAPAS DE IMAGEN — todos los PNG son 5400×1080.
  Se apilan en orden, cada uno cubre el 100% del scene.
  El JS ajusta el scene para que llene la pantalla exacto.

  HOTSPOTS (.hs) — invisibles encima de las imágenes.
  Valores en % sobre 5400×1080:
    left   = (x_px / 5400) × 100
    top    = (y_px / 1080) × 100
    width  = (w_px / 5400) × 100
    height = (h_px / 1080) × 100
  ═══════════════════════════════════════════════════════
  -->

  <!-- CAPA 1: fondo del vestíbulo -->
  <img class="layer" src="vestibulo-bg.PNG" alt="" style="z-index:1;">

  <!-- CAPA 3: Rena -->

  <!-- CAPA 4: timbre -->
  <img class="layer" src="timbre.PNG" alt="" style="z-index:4;">

  <!-- CAPA 5: planta 01 -->
  <img class="layer" src="planta-01.PNG" alt="" style="z-index:5;">

  <img class="layer" src="puerta-biblioteca.PNG" alt="" style="z-index:6;">
  <img class="layer" src="puerta-altar.PNG"     alt="" style="z-index:6;">

  <!-- CAPA 7: plantas 02 y 03 -->
  <img class="layer" src="planta-02.PNG" alt="" style="z-index:7;">
  <img class="layer" src="planta-03.PNG" alt="" style="z-index:7;">

  <!-- CAPA 8: arco de salida -->
  <img class="layer" src="arco-salida.PNG" alt="" style="z-index:8;">

  <!--
  HOTSPOTS — áreas clickables, encima de todo (z-index:20)
  Ajusta los % si algo no coincide exactamente con tu dibujo.
  -->

  <!-- Rena: x=340 y=356 w=270 h=680 sobre 5400×1080 -->
  <button class="hs" style="left:6.3%;top:33%;width:5%;height:63%;"

  <!-- Timbre / laptop: x=460 y=430 w=230 h=200 -->

  <!-- Puerta Taller 03: x=2340 y=22 w=710 h=920 -->

  <!-- Puerta Biblioteca 05: x=3115 y=22 w=710 h=920 -->

    onclick="openDoor('biblioteca')" aria-label="Sala 05 Biblioteca"></button>

  <!-- Puerta Altar 04: x=3890 y=22 w=710 h=920 -->

    onclick="openDoor('altar')" aria-label="Sala 04 Altar"></button>

  <!-- Arco salida: x=4680 y=0 w=720 h=1080 -->
  <button class="hs" style="left:86.7%;top:0;width:13.3%;height:100%;"
    onclick="openDoor('galeria')" aria-label="Continuar recorrido"></button>

</div></div>

<!-- DOTS -->
<div class="dots">
  <div class="dot" id="d0"></div>
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
</div>

      </div>

        <button class="sala-btn" onclick="irA('boutique')"><span class="sb-num">Sala 02</span><span class="sb-name">La Boutique</span><span class="sb-desc">Productos + probador mágico</span></button>

        <button class="sala-btn" onclick="irA('altar')"><span class="sb-num">Sala 04</span><span class="sb-name">Altar de los Recuerdos</span><span class="sb-desc">Para mascotas que ya no están</span></button>

<!-- MODAL MENÚ -->
<div class="overlay" id="modal-menu" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-avatar"><img src="rena-vestibulo.PNG" alt="Rena" onerror="this.parentElement.textContent='🐕'"></div>
      <div><div class="modal-head-name">Rena</div><div class="modal-head-sub">Encuentra tu sala</div></div>
      <button class="modal-close" onclick="closeModal('menu')">✕</button>
    </div>
    <div class="modal-body">
      <div class="bubble-wrap">
        <svg class="bubble-tail" width="22" height="10" viewBox="0 0 22 10"><path d="M0,10 L10,0 L22,10 Z" fill="#F5E9D8" stroke="rgba(193,123,74,.2)" stroke-width="1.5"/></svg>
        <div class="bubble-box"><b>¡Arf!</b> 🐾 ¿Ya sabes a dónde quieres ir? <em>¡Grrr-enial, elige y te llevo!</em></div>

        <button class="menu-item" onclick="irA('galeria')"><div class="mi-num">01</div><div><div class="mi-name">Galería de los Inmortales</div><div class="mi-desc">Retratos reales de mascotas</div></div><div class="mi-arrow">→</div></button>
        <button class="menu-item" onclick="irA('boutique')"><div class="mi-num">02</div><div><div class="mi-name">La Boutique</div><div class="mi-desc">Productos + Probador Mágico</div></div><div class="mi-arrow">→</div></button>
        <button class="menu-item" onclick="irA('taller')"><div class="mi-num">03</div><div><div class="mi-name">El Taller de Edith</div><div class="mi-desc">El proceso del retrato</div></div><div class="mi-arrow">→</div></button>
        <button class="menu-item" onclick="irA('biblioteca')"><div class="mi-num">05</div><div><div class="mi-name">Biblioteca de Cuidados</div><div class="mi-desc">Instrucciones por producto</div></div><div class="mi-arrow">→</div></button>
        <button class="menu-item" onclick="irA('altar')"><div class="mi-num">04</div><div><div class="mi-name">Altar de los Recuerdos</div><div class="mi-desc">Para mascotas que ya no están</div></div><div class="mi-arrow">→</div></button>
      </div>
    </div>
  </div>
</div>

<script>
/* AJUSTE DE TAMAÑO
   Todos los PNGs son 5400×1080 → ratio 5:1
   scene.width = alto_disponible × 5
   Así la imagen llena exactamente la pantalla. */
function setSceneSize(){
  const h = window.innerHeight - 50; // menos el nav
  const w = h * 5;                   // ratio 5400/1080
  const s = document.getElementById('scene');
  s.style.width  = w + 'px';
  s.style.height = h + 'px';
}
setSceneSize();
window.addEventListener('resize', setSceneSize);

/* DATOS DE SALAS */
const SALAS={
  galeria:   {num:'Sala 01',name:'Galería de los Inmortales',icon:'🖼',url:'galeria.html',   msg:'¡<b>Woof woof!</b> 🐾 Esta es mi sala favorita. Aquí están <b>todos los retratos reales</b> que Edith ha hecho. <em>¡Tu mascota puede estar aquí también!</em> <b>¡Grrr-enial!</b>'},
  boutique:  {num:'Sala 02',name:'La Boutique',              icon:'🛍',url:'boutique.html',  msg:'¡<b>Guau</b>, esta sala me encanta! 🐾 Aquí encuentras <b>todos los productos</b> y el <b>Probador Mágico</b>. <em>¡Yo te ayudo a elegir el perfecto!</em> 🐕'},
  taller:    {num:'Sala 03',name:'El Taller de Edith',        icon:'🎨',url:'taller.html',    msg:'<em>Grrr</em>... ¿curiosos? 👀 Aquí puedes ver <b>cómo Edith hace cada retrato</b>. <b>¡Siempre queda woof-derful!</b> 🎨'},
  biblioteca:{num:'Sala 05',name:'Biblioteca de Cuidados',    icon:'📚',url:'biblioteca.html',msg:'¡<b>Arf!</b> ¿Ya tienes tu producto? 📚 Esta sala te dice <b>cómo cuidarlo</b>. <em>¡Grrr-antizado!</em> 🐾'},
  altar:     {num:'Sala 04',name:'Altar de los Recuerdos',    icon:'🕯',url:'altar.html',     msg:'🕯 Esta sala es muy especial. <b>Las mascotas que ya no están siguen presentes</b>. <em>Se entra despacio y con el corazón abierto.</em> 🌸'}
};
let doorTarget=null;

/* SCROLL */
const sw=document.getElementById('sw');
sw.addEventListener('wheel',e=>{e.preventDefault();sw.scrollLeft+=e.deltaY*1.3;},{passive:false});

let isDrag=false,sX=0,sL=0;
sw.addEventListener('mousedown',e=>{isDrag=true;sX=e.pageX;sL=sw.scrollLeft;sw.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{if(!isDrag)return;sw.scrollLeft=sL-(e.pageX-sX);});
window.addEventListener('mouseup',()=>{isDrag=false;sw.style.cursor='grab';});

let tX=0,tL=0;
sw.addEventListener('touchstart',e=>{tX=e.touches[0].clientX;tL=sw.scrollLeft;},{passive:true});
sw.addEventListener('touchmove',e=>{
  sw.scrollLeft=tL+(tX-e.touches[0].clientX)*2.5;
},{passive:true});

/* DOTS */
const ZONES=['Rena · Bienvenida','Galería · Boutique · Taller','Biblioteca · Altar · Salida'];
function updateDots(){
  const max=sw.scrollWidth-sw.clientWidth;
  const pct=max>0?sw.scrollLeft/max:0;
  const z=pct<0.33?0:pct<0.66?1:2;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===z));
  document.getElementById('dlabel').textContent=ZONES[z];
}
sw.addEventListener('scroll',updateDots,{passive:true});
window.addEventListener('load',()=>{sw.scrollLeft=0;updateDots();});

/* MODALES */
function openModal(id){document.getElementById('modal-'+id).classList.add('open');}
function closeModal(id){document.getElementById('modal-'+id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));
});

function openDoor(key){
  const s=SALAS[key];if(!s)return;
  doorTarget=s.url;
  document.getElementById('door-icon').textContent=s.icon;
  document.getElementById('door-num-sub').textContent=s.num;
  document.getElementById('door-num').textContent=s.num;
  document.getElementById('door-name').textContent=s.name;
  document.getElementById('door-msg').innerHTML=s.msg;
  openModal('door');
}
function irADesdeModal(){if(doorTarget)window.location.href=doorTarget;else closeModal('door');}
function irA(key){
  closeModal('rena');closeModal('menu');
  const s=SALAS[key];
